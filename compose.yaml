services:
  gauntlet:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "${GAUNTLET_PORT:-4400}:${GAUNTLET_PORT:-4400}"
    environment:
      - GAUNTLET_PORT=${GAUNTLET_PORT:-4400}
    volumes:
      # Mounts the target project root. Gauntlet writes state to
      # <project>/.gauntlet/. Defaults to "." so `docker compose up`
      # from the Gauntlet repo mounts this repo (Gauntlet-on-Gauntlet).
      - ${TARGET_PROJECT:-.}:/project
    env_file:
      - .env
    command: ["serve", "--project-dir", "/project"]
