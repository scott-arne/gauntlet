services:
  gauntlet:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "4400:4400"
    volumes:
      # Mounts <TARGET_PROJECT>/.gauntlet as the data dir inside the container.
      # Defaults to "." so `docker compose up` from the Gauntlet repo mounts
      # this repo's own .gauntlet (Gauntlet-on-Gauntlet). To test a different
      # project, set TARGET_PROJECT=/abs/or/rel/path in .env or the shell.
      - ${TARGET_PROJECT:-.}/.gauntlet:/data
    env_file:
      - .env
    command: ["serve", "--data-dir", "/data"]
